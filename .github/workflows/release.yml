name: release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix"
        required: true
        type: string

jobs:
  linux-executable:
    runs-on: ubuntu-22.04
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Cache Tauri bundler
        uses: actions/cache@v4
        with:
          path: ~/.cache/tauri
          key: ${{ runner.os }}-tauri-bundler-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-tauri-bundler-

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri Linux dependencies
        run: sudo apt-get update --yes && sudo apt-get install --yes --no-install-recommends libwebkit2gtk-4.1-dev build-essential libxdo-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Check frontend and scripts
        run: npm run build && node --check scripts/ci-build-release.cjs && node --check scripts/ci-create-latest.cjs && node --check scripts/deploy-pages.cjs && node --check scripts/release-help.cjs && node --check scripts/release.cjs

      - name: Build Linux Executable
        run: node scripts/ci-build-release.cjs --platform=linux --version=${{ inputs.version }}

      - name: Create latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          cp dist/release/* artifacts/
          gh release download "v${{ inputs.version }}" --pattern update_manifest_windows.json --dir artifacts || true
          node scripts/ci-create-latest.cjs artifacts

      - name: Upload Linux assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ inputs.version }}" artifacts/latest.yml artifacts/Aero-P2P-Chat-Linux.x86_64 --clobber

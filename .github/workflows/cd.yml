name: CD

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build Windows setup
        run: node scripts/ci-build-release.cjs --platform=windows --version=${{ github.ref_name }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-Windows-x64
          path: dist/release/*
          if-no-files-found: error

  linux:
    runs-on: ubuntu-22.04
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Linux Tauri dependencies
        run: sudo apt-get update --yes && sudo apt-get install --yes libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Test
        run: npm run test

      - name: Build Linux AppImage
        run: node scripts/ci-build-release.cjs --platform=linux --version=${{ github.ref_name }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-Linux-x64
          path: dist/release/*
          if-no-files-found: error

  release:
    needs: [windows, linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create latest.yml
        run: node scripts/ci-create-latest.cjs ./artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            ./artifacts/latest.yml
            ./artifacts/artifacts-Windows-x64/Aero-P2P-Chat-Windows-Setup.exe
            ./artifacts/artifacts-Linux-x64/Aero-P2P-Chat-Linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

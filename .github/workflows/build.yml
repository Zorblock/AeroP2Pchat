name: build

permissions:
  contents: write

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            node scripts/ci-build-release.cjs --platform=linux --version=${{ github.ref_name }}
          else
            node scripts/ci-build-release.cjs --platform=linux
          fi

      - name: Create latest.yml
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/ci-create-latest.cjs dist/release

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/release/latest.yml
            dist/release/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-Linux-x64
          path: dist/release/*
          if-no-files-found: error
          retention-days: 7

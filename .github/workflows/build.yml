name: build

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  linux:
    runs-on: ubuntu-22.04
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build Linux AppImage
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/ci-build-release.cjs --platform=linux --version=${{ github.ref_name }}

      - name: Download existing latest.yml from release
        run: gh release download "${{ github.ref_name }}" --pattern "latest.yml" --dir ./dist/release --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append Linux entries to latest.yml
        run: node scripts/ci-append-linux-latest.cjs ./dist/release/latest.yml ./dist/release

      - name: Upload Linux assets and updated latest.yml to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            "./dist/release/Aero-P2P-Chat-Linux-x64."* \
            "./dist/release/latest.yml" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: build

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        type: string

jobs:
  linux:
    runs-on: ubuntu-22.04
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build Linux AppImage
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node scripts/ci-build-release.cjs --platform=linux --version=${{ inputs.version }}

      - name: Upload Linux release artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            dist/release/Aero-P2P-Chat-Linux-x64.*
            dist/release/update_manifest_linux.json
          if-no-files-found: error

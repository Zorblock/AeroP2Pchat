name: GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            .pages/package-lock.json

      - name: Build Website
        run: |
          npm ci
          cd .pages
          npm ci
          cd ..
          npm run build:web

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload dist
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aero P2P Chat</title>
    <style>
      :root {
        background: #83cbe9;
        color: #0d2f43;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 8%, rgba(255, 255, 255, 0.85), transparent 14rem),
          linear-gradient(145deg, #99def5 0%, #e4fff7 47%, #6dbce5 100%);
      }

      .hidden {
        display: none !important;
      }

      body.app-loading .window-frame {
        visibility: hidden;
      }

      .boot-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 24% 12%, rgba(255, 255, 255, 0.9), transparent 12rem),
          linear-gradient(145deg, #99def5 0%, #e4fff7 47%, #6dbce5 100%);
      }

      .boot-panel {
        display: grid;
        justify-items: center;
        gap: 12px;
        min-width: 210px;
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 7px;
        padding: 22px 24px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.76), rgba(183, 239, 252, 0.64));
        box-shadow:
          0 18px 38px rgba(10, 76, 115, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }

      .boot-logo {
        display: grid;
        place-items: center;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 24%, rgba(255, 255, 255, 0.95), transparent 1.3rem),
          linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(79, 200, 234, 0.78));
        color: #07364f;
        font-size: 24px;
        font-weight: 900;
        box-shadow:
          inset -6px -7px 12px rgba(0, 70, 110, 0.24),
          0 8px 16px rgba(0, 112, 158, 0.22);
      }

      .boot-title {
        margin: 0;
        color: #07364f;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .boot-status {
        color: #477487;
        font-size: 12px;
        font-weight: 800;
      }

      .boot-dots {
        display: flex;
        gap: 5px;
      }

      .boot-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #149ac7;
        animation: bootPulse 0.9s ease-in-out infinite;
      }

      .boot-dots span:nth-child(2) {
        animation-delay: 0.12s;
      }

      .boot-dots span:nth-child(3) {
        animation-delay: 0.24s;
      }

      body:not(.app-loading) .boot-screen {
        display: none;
      }

      @keyframes bootPulse {
        0%,
        100% {
          opacity: 0.35;
          transform: translateY(0);
        }

        50% {
          opacity: 1;
          transform: translateY(-3px);
        }
      }
    </style>
    <script type="module" src="/src/renderer.js"></script>
  </head>
  <body class="app-loading">
    <div id="boot-screen" class="boot-screen" aria-label="Loading Aero P2P Chat">
      <section class="boot-panel">
        <div class="boot-logo" aria-hidden="true">A</div>
        <h1 class="boot-title">Aero P2P Chat</h1>
        <span class="boot-status">Loading interface</span>
        <div class="boot-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>
    </div>
    <div class="window-frame">
      <header class="titlebar">
        <div class="titlebar-brand">
          <img id="titlebar-logo" class="titlebar-logo" alt="" aria-hidden="true" />
          <div>
            <strong>Aero P2P Chat</strong>
            <span id="titlebar-subtitle">Ready</span>
          </div>
        </div>
        <div class="titlebar-shine" aria-hidden="true"></div>
        <div class="window-controls">
          <button id="window-minimize" type="button" title="Minimize" aria-label="Minimize">
            <i class="fa-solid fa-minus" aria-hidden="true"></i>
          </button>
          <button id="window-maximize" type="button" title="Maximize" aria-label="Maximize">
            <i class="fa-regular fa-square" aria-hidden="true"></i>
          </button>
          <button id="window-close" class="window-close" type="button" title="Close" aria-label="Close">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </div>
      </header>
      <main class="app-shell">
      <section class="connection-panel" aria-label="Connection">
        <div class="brand-row">
          <img id="brand-logo" class="brand-logo" alt="" aria-hidden="true" />
          <div>
            <h1>Aero P2P</h1>
          </div>
          <button id="header-update-button" class="header-update-button hidden" type="button">Update</button>
          <button id="settings-button" class="settings-button" type="button" title="Settings" aria-label="Settings">
            <i class="fa-solid fa-gear" aria-hidden="true"></i>
          </button>
        </div>

        <div class="id-card">
          <span class="label">My Aero ID</span>
          <div class="id-row">
            <code id="own-id">creating...</code>
            <button id="copy-id" class="icon-button" type="button" title="Copy peer ID" aria-label="Copy peer ID">
              <i class="fa-regular fa-copy" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <form id="connect-form" class="connect-form">
          <label for="remote-id">Friend Aero ID</label>
          <div class="connect-row">
            <input id="remote-id" name="remote-id" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="aero-..." />
            <button id="connect-button" type="submit" disabled>
              <i class="fa-solid fa-link" aria-hidden="true"></i>
              <span>Connect</span>
            </button>
          </div>
        </form>

        <div class="status-card">
          <span id="status-dot" class="status-dot pending" aria-hidden="true"></span>
          <div>
            <span class="label">Status</span>
            <strong id="status-text">Initializing peer...</strong>
          </div>
        </div>

        <div id="update-card" class="update-card hidden">
          <span class="label">Update</span>
          <strong id="update-title">Update available</strong>
          <p id="update-text"></p>
          <button id="update-button" type="button">Update</button>
        </div>

        <div class="peers-card">
          <span class="label">Contacts</span>
          <div id="peer-list" class="peer-list">
            <span class="empty-peer">No contacts yet</span>
          </div>
        </div>
      </section>

      <section class="chat-panel" aria-label="Chat">
        <header class="chat-header">
          <div>
            <span class="label">Chat</span>
            <h2 id="chat-title">Ready to connect</h2>
          </div>
          <div class="chat-actions">
            <button id="disconnect-chat" class="ghost-button danger" type="button" disabled>
              <i class="fa-solid fa-plug-circle-xmark" aria-hidden="true"></i>
              <span>Disconnect</span>
            </button>
            <button id="clear-chat" class="ghost-button" type="button">
              <i class="fa-regular fa-trash-can" aria-hidden="true"></i>
              <span>Clear</span>
            </button>
          </div>
        </header>

        <div id="messages" class="messages empty" aria-live="polite" data-empty="Share your Aero ID or connect to a contact."></div>

        <form id="message-form" class="message-form">
          <input id="message-input" name="message" autocomplete="off" placeholder="Write a message..." disabled />
          <button id="send-button" type="submit" disabled>
            <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
            <span>Send</span>
          </button>
        </form>
      </section>
      </main>
    </div>

    <div id="update-modal" class="modal-layer hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <section class="modal-panel">
        <header class="modal-header">
          <h2 id="modal-title">Linux update</h2>
          <button id="modal-close" class="ghost-button" type="button">Close</button>
        </header>
        <p id="modal-text"></p>
        <code id="linux-command" class="command-box"></code>
        <button id="copy-update-command" type="button">Copy command</button>
      </section>
    </div>

    <div id="settings-modal" class="modal-layer hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <section class="modal-panel">
        <header class="modal-header">
          <h2 id="settings-title">Settings</h2>
          <button id="settings-close" class="ghost-button" type="button">Close</button>
        </header>
        <div class="settings-field">
          <span class="label">My nickname</span>
          <div class="settings-row">
            <input id="nickname-input" type="text" maxlength="32" placeholder="Nickname" />
            <button id="save-nickname" type="button">Save</button>
          </div>
        </div>
        <span class="label">Contact nicknames</span>
        <div id="contact-nickname-list" class="contact-nickname-list"></div>
        <span class="label">Blocked users</span>
        <div id="blocked-list" class="blocked-list"></div>
      </section>
    </div>

    <div id="contact-menu" class="context-menu hidden" role="menu">
      <button id="menu-trust" type="button" role="menuitem">
        <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
        <span>Trust</span>
      </button>
      <button id="menu-pin" type="button" role="menuitem">
        <i class="fa-solid fa-thumbtack" aria-hidden="true"></i>
        <span>Pin</span>
      </button>
      <button id="menu-nickname" type="button" role="menuitem">
        <i class="fa-solid fa-pen" aria-hidden="true"></i>
        <span>Add nickname</span>
      </button>
      <button id="menu-block" type="button" role="menuitem">
        <i class="fa-solid fa-ban" aria-hidden="true"></i>
        <span>Block</span>
      </button>
    </div>
  </body>
</html>
